{% extends "base.html" %}
{% block title %}Edit expense{% endblock %}
{% block content %}
<section>
    <h2>Edit expense</h2>
    <form method="post">
        <label>
            Amount
            <input type="number" name="amount" step="0.01" min="0.01" value="{{ expense.amount }}" required>
        </label>
        <label>
            Description
            <input type="text" name="description" value="{{ expense.description }}" required>
        </label>
        <label>
            Date
            <input type="date" name="date" value="{{ expense.date }}" required>
        </label>
        <button type="submit">Save</button>
    </form>
    <a href="{{ url_for('dashboard') }}">Cancel</a>
</section>
{% endblock %}
